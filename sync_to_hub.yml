name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  force_push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ }}
        run: git push --force https://ridhijain709:$HF_TOKEN@huggingface.co/spaces/ridhijain709/aicteibmai main
